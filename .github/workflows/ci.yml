name: ci
on: [push, pull_request]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone zig-syrup sibling
        run: git clone --depth 1 -b radical/zig-0.16.0-native https://github.com/plurigrid/zig-syrup.git ../zig-syrup
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig version
      - run: zig fmt --check .
      - run: zig build
      - run: zig build test --summary all
