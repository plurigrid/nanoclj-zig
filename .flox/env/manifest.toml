## nanoclj-zig — Flox environment for the Zig Clojure interpreter +
## the agent-o-nanoclj feedback-loop runtime.
##
## Mirrors what CI uses (mlugg/setup-zig@v2, version 0.16.0) so a local
## build matches CI byte-for-byte.
##
## Quickstart:
##   flox activate
##   zig build                       # all binaries → zig-out/bin/
##   zig build loop-test --summary all # 80+ agent-o-nanoclj loop-core tests
##   zig build test --summary all      # full nz suite incl. loop core
##
## Sibling repo: nanoclj-zig builds against `../zig-syrup`. Clone it if
## missing — the activation hook reminds you.
##
## Build (flox-native, gets you a $out/bin/nanoclj):
##   flox build nanoclj-zig
##
## Publish to a Flox catalog:
##   flox publish nanoclj-zig

version = 1

[install]
zig.pkg-path = "zig"
git.pkg-path = "git"

[vars]
NANOCLJ_DEFAULT_BUILD = "ReleaseSafe"

[hook]
on-activate = '''
  echo "nanoclj-zig env — zig $(zig version 2>/dev/null || echo 'not yet on PATH')"
  if [ ! -d ../zig-syrup ]; then
    echo ""
    echo "  ⓘ  ../zig-syrup not found — required sibling for cross-repo build."
    echo "     Clone it next to this repo:"
    echo "       git clone https://github.com/plurigrid/zig-syrup.git ../zig-syrup"
    echo ""
  fi
'''

[profile]
common = '''
  alias nb='zig build'
  alias nt='zig build test --summary all'
  alias nl='zig build loop-test --summary all'
'''

[build]
[build.nanoclj-zig]
description = "Zig Clojure interpreter with agent-o-nanoclj runtime"
version = "0.1.0"
command = """
  if [ ! -d ../zig-syrup ]; then
    echo "ERROR: ../zig-syrup is required for the build" >&2
    exit 1
  fi
  zig build -Doptimize=$NANOCLJ_DEFAULT_BUILD
  mkdir -p $out/bin
  install -m 755 zig-out/bin/nanoclj         $out/bin/nanoclj
  install -m 755 zig-out/bin/nanoclj-mcp     $out/bin/nanoclj-mcp
  install -m 755 zig-out/bin/gorj-mcp        $out/bin/gorj-mcp
  install -m 755 zig-out/bin/nanoclj-strip   $out/bin/nanoclj-strip
"""

[options]
systems = [
  "aarch64-darwin",
  "aarch64-linux",
  "x86_64-darwin",
  "x86_64-linux",
]
