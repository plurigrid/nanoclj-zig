{
  "lockfile-version": 1,
  "manifest": {
    "version": 1,
    "install": {
      "git": {
        "pkg-path": "git"
      },
      "zig": {
        "pkg-path": "zig"
      }
    },
    "vars": {
      "NANOCLJ_DEFAULT_BUILD": "ReleaseSafe"
    },
    "hook": {
      "on-activate": "  echo \"nanoclj-zig env — zig $(zig version 2>/dev/null || echo 'not yet on PATH')\"\n  if [ ! -d ../zig-syrup ]; then\n    echo \"\"\n    echo \"  ⓘ  ../zig-syrup not found — required sibling for cross-repo build.\"\n    echo \"     Clone it next to this repo:\"\n    echo \"       git clone https://github.com/plurigrid/zig-syrup.git ../zig-syrup\"\n    echo \"\"\n  fi\n"
    },
    "profile": {
      "common": "  alias nb='zig build'\n  alias nt='zig build test --summary all'\n  alias nl='zig build loop-test --summary all'\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-darwin",
        "x86_64-linux"
      ]
    },
    "build": {
      "nanoclj-zig": {
        "command": "  if [ ! -d ../zig-syrup ]; then\n    echo \"ERROR: ../zig-syrup is required for the build\" >&2\n    exit 1\n  fi\n  zig build -Doptimize=$NANOCLJ_DEFAULT_BUILD\n  mkdir -p $out/bin\n  install -m 755 zig-out/bin/nanoclj         $out/bin/nanoclj\n  install -m 755 zig-out/bin/nanoclj-mcp     $out/bin/nanoclj-mcp\n  install -m 755 zig-out/bin/gorj-mcp        $out/bin/gorj-mcp\n  install -m 755 zig-out/bin/nanoclj-strip   $out/bin/nanoclj-strip\n",
        "version": "0.1.0",
        "description": "Zig Clojure interpreter with agent-o-nanoclj runtime"
      }
    }
  },
  "packages": [
